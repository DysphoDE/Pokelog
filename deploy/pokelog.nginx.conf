server {
    listen 80;
    listen [::]:80;
    server_name pokelog.dyspho.de;

    root /var/www/pokelog/public;
    index index.php;

    client_max_body_size 12m;

    # Service Worker nicht hart cachen, damit Updates ankommen.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # Versteckte Dateien blockieren (außer ACME-Challenge).
    location ~ /\.(?!well-known) {
        deny all;
    }
}
