<style>
        .scanner-corners::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 40px; height: 40px;
            border-top: 4px solid #bc0100;
            border-left: 4px solid #bc0100;
            border-top-left-radius: 12px;
        }
        .scanner-corners::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 40px; height: 40px;
            border-top: 4px solid #bc0100;
            border-right: 4px solid #bc0100;
            border-top-right-radius: 12px;
        }
        .scanner-corners-bottom::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 40px; height: 40px;
            border-bottom: 4px solid #bc0100;
            border-left: 4px solid #bc0100;
            border-bottom-left-radius: 12px;
        }
        .scanner-corners-bottom::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 40px; height: 40px;
            border-bottom: 4px solid #bc0100;
            border-right: 4px solid #bc0100;
            border-bottom-right-radius: 12px;
        }
        
        @keyframes scanline {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scan-line {
            animation: scanline 3s linear infinite;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-lg h-screen flex overflow-hidden">
<!-- Suppression Logic Applied: Transactional Screen (Scan & Add Card). Navigation shell suppressed to focus entirely on the scanning canvas. -->
<main class="w-full h-full relative bg-inverse-surface text-on-primary">
<!-- Close Button (Temporary Departure) -->
<button class="absolute top-8 left-8 z-50 w-12 h-12 rounded-full bg-surface/20 backdrop-blur-md flex items-center justify-center hover:bg-surface/30 transition-colors">
<span class="material-symbols-outlined text-white" data-icon="close">close</span>
</button>
<!-- Camera Viewfinder Area -->
<div class="absolute inset-0 z-0">
<!-- Simulated Camera Feed -->
<div class="w-full h-full bg-cover bg-center opacity-40" data-alt="A slightly blurred, real-world desk environment seen through a smartphone camera lens. A high-end minimalist setting with soft, natural lighting coming from a nearby window. The desk surface is a pristine, light-colored matte material. The overall tone is modern, clean, and subtly atmospheric, indicating a high-tech scanning process." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDFa8lheM1tu9194e0zJbTuFcICK7VqMZWWbe6pGOQL2pQ0x_eqSxEcFYX5de6SshjsGBtorzYXnSjIFXkgJor4RSqokz1PIkCCBr7PeAW66meOTHqn1__aGVsosESvm2q1Cj5W7COueWRSG4tRKpnN4DSyDUVqi-KnNUdx2rAgxG-TLd33a_osBDnc1AlZMC38Tv-aXz0kGp8aV8l2mRa2vQzu3jGQJ6yd0m6riMXbq63ENgvhm3KQntVvnp_VXupCBnna5lpC1bEs')"></div>
<!-- Dark Overlay -->
<div class="absolute inset-0 bg-black/60 backdrop-blur-[2px]"></div>
</div>
<!-- Scanning Interface -->
<div class="relative z-10 w-full h-full flex flex-col items-center justify-center p-8">
<!-- Header Text -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-white mb-stack-sm">Align Card</h1>
<p class="font-body-lg text-body-lg text-surface-variant">Position the card within the frame to scan.</p>
</div>
<!-- Viewfinder Frame -->
<div class="relative w-full max-w-[340px] aspect-[2.5/3.5] mx-auto mb-stack-lg">
<!-- Inner Clear Area (Simulated by box-shadow on a pseudo element if we wanted full masking, but here we'll use an empty div with borders) -->
<div class="absolute inset-0 rounded-xl overflow-hidden">
<!-- The bright area -->
<div class="w-full h-full bg-cover bg-center" data-alt="A perfectly clear, in-focus view of a rare, holographic trading card lying flat on the clean desk. The card is a classic, highly sought-after design, featuring vibrant colors and a subtle metallic sheen. The lighting is perfectly balanced to eliminate glare, highlighting the pristine condition of the card. The overall aesthetic is premium, high-tech, and sharply defined." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAZ9EQVWaAvbPnLFaEECqAxTyMBNU_6RWTpN-lZNbK0tB2xd03HuMQJdJK0vtSfrBr-po8gSyAh7tZige4PHWodyQDk5PuOVyb9gHP6dO-BdHB66E0VKRSPPzf8GwcOjULAXOpQ9gyLEtKK_PwtP9mdqa63XQZMCxgjjf65YRgk-8MlujpvvCI1cjcLg1GyEXIgQ6HB6i7ckupPnFMVy8Af91UugObEUn8VcqMkq6hFmr0Mop-r--5t3SBUAEBIRppkrTfHD2UeSOi9')"></div>
<!-- Scan Line Overlay -->
<div class="scan-line absolute left-0 w-full h-1 bg-primary shadow-[0_0_15px_rgba(188,1,0,0.8)] z-20"></div>
</div>
<!-- Corner Guides -->
<div class="scanner-corners absolute inset-0 z-30 pointer-events-none"></div>
<div class="scanner-corners-bottom absolute inset-0 z-30 pointer-events-none"></div>
<!-- Center Reticle -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 opacity-50 z-30 pointer-events-none">
<span class="material-symbols-outlined text-white text-3xl" data-icon="add">add</span>
</div>
</div>
<!-- Bottom Controls / Status -->
<div class="w-full max-w-md mx-auto">
<!-- Detecting State Panel -->
<div class="bg-surface/10 backdrop-blur-lg rounded-xl p-6 border border-white/10 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center animate-pulse">
<span class="material-symbols-outlined text-primary" data-icon="document_scanner">document_scanner</span>
</div>
<div>
<p class="font-label-mono text-label-mono text-tertiary-fixed mb-1 uppercase">Status</p>
<p class="font-title-md text-title-md text-white">Detecting...</p>
</div>
</div>
<!-- Manual Entry Fallback -->
<button class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors font-label-mono text-label-mono text-white">
                        Manual Entry
                    </button>
</div>
</div>
</div>
</main>
